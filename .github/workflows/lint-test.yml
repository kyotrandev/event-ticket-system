name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-lint-test:
    name: API (Nest.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_TYPE: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: test
          DATABASE_SYNCHRONIZE: true
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          AUTH_JWT_SECRET: test_jwt_secret
          AUTH_JWT_TOKEN_EXPIRES_IN: 15m
          AUTH_REFRESH_SECRET: test_refresh_secret
          AUTH_REFRESH_TOKEN_EXPIRES_IN: 7d
          AUTH_FORGOT_SECRET: test_forgot_secret
          AUTH_FORGOT_TOKEN_EXPIRES_IN: 30m
          AUTH_CONFIRM_EMAIL_SECRET: test_confirm_secret
          AUTH_CONFIRM_EMAIL_TOKEN_EXPIRES_IN: 1d
          MAIL_HOST: localhost
          MAIL_PORT: 1025
          MAIL_IGNORE_TLS: true
          FILE_DRIVER: local
          APP_PORT: 3000
          FRONTEND_DOMAIN: http://localhost:3001
          BACKEND_DOMAIN: http://localhost:3000

  web-lint-build:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [api-lint-test, web-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t event-ticket-api:test ./apps/api

      - name: Build Web image
        run: docker build -t event-ticket-web:test ./apps/web
